<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <defs>
    <linearGradient id="grad-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6272a4" stop-opacity="0.15"/>
      <stop offset="25%"  stop-color="#6272a4" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#6272a4" stop-opacity="0.5"/>
      <stop offset="75%"  stop-color="#bd93f9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="grad-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bd93f9" stop-opacity="0.9"/>
      <stop offset="25%"  stop-color="#bd93f9" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#6272a4" stop-opacity="0.5"/>
      <stop offset="75%"  stop-color="#6272a4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6272a4" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" rx="12" fill="#282a36"/>

  <!-- Outer border -->
  <rect x="30" y="20" width="540" height="240" rx="8"
        stroke="#bd93f9" stroke-width="2.5" fill="none"/>

  <!-- Left gradient blocks -->
  <rect x="50" y="56" width="120" height="28" rx="3" fill="url(#grad-l)"/>
  <rect x="50" y="196" width="120" height="28" rx="3" fill="url(#grad-l)"/>

  <!-- Right gradient blocks -->
  <rect x="430" y="56" width="120" height="28" rx="3" fill="url(#grad-r)"/>
  <rect x="430" y="196" width="120" height="28" rx="3" fill="url(#grad-r)"/>

  <!-- Inner box -->
  <rect x="170" y="90" width="260" height="100" rx="6"
        stroke="#ff79c6" stroke-width="2.5" fill="none"/>

  <!-- Name text -->
  <text x="300" y="150" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace"
        font-size="30" font-weight="bold" letter-spacing="0.35em"
        fill="#f8f8f2">
    devlair
  </text>
</svg>
