name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs['.--release_created'] }}
      tag_name: ${{ steps.rp.outputs['.--tag_name'] }}
      cli_release_created: ${{ steps.rp.outputs['cli--release_created'] }}
      cli_tag_name: ${{ steps.rp.outputs['cli--tag_name'] }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name devlair \
            --strip \
            devlair/cli.py
          mv dist/devlair dist/devlair-linux-${{ matrix.arch }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/devlair-linux-${{ matrix.arch }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: devlair-linux-${{ matrix.arch }}
          path: dist/devlair-linux-${{ matrix.arch }}

  checksums:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: devlair-linux-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum devlair-linux-* | tee checksums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: binaries/checksums.txt

  build-cli:
    needs: release-please
    if: needs.release-please.outputs.cli_release_created == 'true'
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            arch: x86_64
            target: bun-linux-x64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64
            target: bun-linux-arm64

    runs-on: ${{ matrix.runs-on }}

    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            src/index.tsx \
            --outfile dist/devlair-cli-linux-${{ matrix.arch }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.cli_tag_name }}
          files: cli/dist/devlair-cli-linux-${{ matrix.arch }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: devlair-cli-linux-${{ matrix.arch }}
          path: cli/dist/devlair-cli-linux-${{ matrix.arch }}

  checksums-cli:
    needs: [release-please, build-cli]
    if: needs.release-please.outputs.cli_release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: devlair-cli-linux-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum devlair-cli-linux-* | tee checksums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.cli_tag_name }}
          files: binaries/checksums.txt
